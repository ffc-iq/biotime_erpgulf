<div class="manual-punch-container">
    <div class="punch-card">
        <h2 class="punch-title">
            <span>⏱</span> Manual Punch Entry
        </h2>

        <div class="form-group">
            <label>Employee</label>
            <select id="employee" class="form-control">
                <option value="">-- Select Employee --</option>
            </select>
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date" id="punch_date" class="form-control"/>
        </div>

        <div class="form-group">
            <label>Time</label>
            <input type="time" id="punch_time" class="form-control"/>
        </div>

        <div class="form-group">
            <label>Type</label>
            <div class="punch-type-buttons">
                <button class="punch-type-btn active" id="btn_in" onclick="selectType('IN')">
                    ● IN
                </button>
                <button class="punch-type-btn" id="btn_out" onclick="selectType('OUT')">
                    ● OUT
                </button>
            </div>
        </div>

        <button class="btn-submit" onclick="submitPunch()">
            Add Punch
        </button>

        <div id="result_message"></div>

        <!-- Recent Punches -->
        <div class="recent-section">
            <h4>Recent Manual Punches</h4>
            <table class="punch-table">
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Date & Time</th>
                        <th>Type</th>
                    </tr>
                </thead>
                <tbody id="recent_punches">
                    <tr><td colspan="3" style="text-align:center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
